<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Monopoly JOR - Animated Pro</title>
    <style>
        :root { --bg: #0a2540; --gold: #d4af37; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
        
        #hud { display: flex; gap: 30px; font-size: 1.5rem; background: var(--glass); backdrop-filter: blur(10px); padding: 20px 40px; border-radius: 50px; border: 1px solid var(--gold); margin: 20px; color: var(--gold); font-weight: bold; }
        
        #board { display: grid; grid-template-columns: repeat(11, 1fr); grid-template-rows: repeat(11, 1fr); width: 90vw; height: 90vw; max-width: 600px; border: 1.5vw solid var(--gold); border-radius: 20px; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .tile { border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; background: rgba(0, 58, 112, 0.8); transition: background 0.3s; }
        .active { background: var(--gold) !important; color: black; font-weight: bold; transform: scale(1.05); box-shadow: 0 0 20px var(--gold); z-index: 10; }
        .center-area { grid-column: 2 / 11; grid-row: 2 / 11; background: #002d5e; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--gold); }
        
        #controls { margin-top: 30px; display: flex; align-items: center; gap: 30px; }
        #go-btn { width: 120px; height: 120px; background: #ff4757; border-radius: 50%; border: 8px solid white; font-size: 2rem; cursor: pointer; color: white; transition: 0.3s; }
        #go-btn:disabled { background: #555; cursor: not-allowed; }
        #multiplier { padding: 15px; font-size: 1.5rem; border-radius: 15px; background: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="hud">
        <div>الرصيد: <span id="balance">1500</span></div>
        <div>النرد: <span id="dice-bal">500</span></div>
    </div>

    <div id="board"></div>

    <div id="controls">
        <select id="multiplier"><option value="1">x1</option><option value="10">x10</option><option value="50">x50</option><option value="100">x100</option></select>
        <button id="go-btn" onclick="startRolling()">GO</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
